<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Benchmarks | sTiles</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --lime: #c5d86d;
            --lime-dark: #a8bd4d;
            --orange: #e08c5a;
            --teal: #4a9a8f;
            --teal-dark: #3a7a71;
            --black: #1a1a1a;
            --charcoal: #2d2d2d;
            --bg-primary: #fafafa;
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-muted: #888888;
            --border: #e0e0e0;
            --gradient-hero: linear-gradient(180deg, var(--black) 0%, var(--charcoal) 100%);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: var(--gradient-hero);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .gate {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.10);
            border-radius: 16px;
            padding: 48px 52px;
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .brand {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            margin-bottom: 8px;
        }

        .brand span {
            background: linear-gradient(135deg, var(--lime) 0%, var(--teal) 50%, var(--orange) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 0.88rem;
            color: rgba(255,255,255,0.45);
            margin-bottom: 36px;
        }

        label {
            display: block;
            text-align: left;
            font-size: 0.8rem;
            font-weight: 600;
            color: rgba(255,255,255,0.55);
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 8px;
        }

        input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 8px;
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 20px;
        }

        input[type="password"]:focus {
            border-color: var(--teal);
        }

        input[type="password"].error {
            border-color: var(--orange);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--teal);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
        }

        button:hover { background: var(--teal-dark); }
        button:active { transform: scale(0.98); }

        .error-msg {
            display: none;
            margin-top: 14px;
            font-size: 0.82rem;
            color: var(--orange);
        }

        .back {
            margin-top: 28px;
            font-size: 0.82rem;
            color: rgba(255,255,255,0.35);
        }

        .back a {
            color: rgba(255,255,255,0.5);
            text-decoration: none;
            transition: color 0.2s;
        }

        .back a:hover { color: var(--lime); }
    </style>
</head>
<body>
    <div class="gate">
        <div class="brand"><span>sTiles</span> Benchmarks</div>
        <p class="subtitle">This area is restricted. Enter the access key to continue.</p>

        <label for="pw">Access key</label>
        <input type="password" id="pw" placeholder="••••" autocomplete="off" autofocus>
        <button onclick="check()">Enter</button>
        <p class="error-msg" id="err">Incorrect key. Please try again.</p>

        <p class="back"><a href="index.html">Back to sTiles</a></p>
        <p style="margin-top:18px;font-size:0.75rem;color:#888;line-height:1.6;">Preliminary data · not for distribution.</p>
    </div>

    <script>
        document.getElementById('pw').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') check();
        });

        function check() {
            const pw = document.getElementById('pw').value;
            const input = document.getElementById('pw');
            const err = document.getElementById('err');

            if (pw === 'inla') {
                sessionStorage.setItem('stiles_bench_auth', '1');
                window.location.href = 'suits/index.html';
            } else {
                input.classList.add('error');
                err.style.display = 'block';
                input.value = '';
                input.focus();
            }
        }
    </script>
</body>
</html>
